<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Grove Fit">
  <defs>
    <linearGradient id="chip-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6b3a"/>
      <stop offset="55%" stop-color="#3d5a30"/>
      <stop offset="100%" stop-color="#2f4725"/>
    </linearGradient>
    <linearGradient id="pin-face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f7040"/>
      <stop offset="100%" stop-color="#2f4725"/>
    </linearGradient>
    <radialGradient id="led-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8ff6a"/>
      <stop offset="45%" stop-color="#7ee03a"/>
      <stop offset="100%" stop-color="#7ee03a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2f18" flood-opacity="0.22"/>
    </filter>
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="-2" dy="-2" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="inner"/>
      <feColorMatrix in="inner" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.62 0 0 0 0 0.35 0 0 0 0.35 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#ffffff"/>

  <g filter="url(#soft-shadow)">
  <!-- Left pins -->
  <g fill="url(#pin-face)">
    <rect x="72" y="118" width="34" height="22" rx="8"/>
    <rect x="72" y="154" width="34" height="22" rx="8"/>
    <rect x="72" y="190" width="34" height="22" rx="8"/>
    <rect x="72" y="226" width="34" height="22" rx="8"/>
    <rect x="72" y="262" width="34" height="22" rx="8"/>
    <rect x="72" y="298" width="34" height="22" rx="8"/>
    <rect x="72" y="334" width="34" height="22" rx="8"/>
  </g>

  <!-- Bottom pins -->
  <g fill="url(#pin-face)">
    <rect x="142" y="406" width="22" height="34" rx="8"/>
    <rect x="178" y="406" width="22" height="34" rx="8"/>
    <rect x="214" y="406" width="22" height="34" rx="8"/>
    <rect x="250" y="406" width="22" height="34" rx="8"/>
    <rect x="286" y="406" width="22" height="34" rx="8"/>
    <rect x="322" y="406" width="22" height="34" rx="8"/>
  </g>

  <!-- Chip body -->
  <rect x="106" y="106" width="300" height="300" rx="58" fill="url(#chip-face)" filter="url(#inner-glow)"/>

  <!-- Top-left highlight -->
  <path d="M132 132 C170 118 220 112 270 118 C300 122 330 132 352 148" fill="none" stroke="#6f915d" stroke-width="10" stroke-linecap="round" opacity="0.35"/>

  <!-- Leaf -->
  <g transform="translate(256 248) rotate(28)">
    <path
      d="M-58 18 C-42 -58 42 -58 58 18 C34 42 -34 42 -58 18 Z"
      fill="#ffffff"
    />
    <path
      d="M-8 -34 C-2 -8 2 10 6 30"
      fill="none"
      stroke="#d8e8d0"
      stroke-width="5"
      stroke-linecap="round"
    />
  </g>

  <!-- Status LED -->
  <circle cx="368" cy="368" r="34" fill="url(#led-glow)"/>
  <circle cx="368" cy="368" r="12" fill="#9dff4d"/>
  <circle cx="364" cy="364" r="4" fill="#e8ffd0" opacity="0.85"/>
  </g>
</svg>
